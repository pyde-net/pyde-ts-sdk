name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Gate on high+ production vulns. Dev-deps run audit at a looser
      # bar (warning only) — they don't ship to consumers and the
      # vitest/vite/esbuild chain churns often.
      - run: npm audit --omit=dev --audit-level=high
      - run: npm audit --audit-level=high || echo "::warning::dev-dep audit found high-severity vulns"
